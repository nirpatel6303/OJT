<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cart</title>
	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<style>
		.cart-container { max-width:1100px; margin:40px auto; padding:0 20px 40px; }
		.cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
		.cart-actions a, .cart-actions button { background:#ff3939; color:#fff; border:none; padding:10px 18px; border-radius:6px; text-decoration:none; }
		.cart-list { display:grid; gap:20px; }
		.cart-item { display:grid; grid-template-columns:100px 1fr 140px 120px; gap:16px; align-items:center; padding:18px; background:#fff; border-radius:12px; box-shadow:0 3px 12px rgba(0,0,0,0.08); }
		.cart-item-image{ width:100px; height:100px; overflow:hidden; border-radius:12px; }
		.cart-item-image img{ width:100%; height:100%; object-fit:cover }
		.cart-item-remove{ background:transparent; border:1px solid #ff3939; color:#ff3939; padding:8px 12px; border-radius:6px; cursor:pointer }
		.cart-total{ margin-top:20px; display:flex; justify-content:space-between; align-items:center; padding:18px 24px; background:#fff5f5; border-radius:12px }
		.cart-empty{ text-align:center; padding:40px; background:#fff; border-radius:12px }
		@media (max-width:900px){ .cart-item{ grid-template-columns:1fr } }
	</style>
</head>
<body>
	<header>
		<img src="https://b.zmtcdn.com/web_assets/b40b97e677bc7b2ca77c58c61db266fe1603954218.png" tabindex="0" height="30">
	</header>

	<main class="cart-container">
		<div class="cart-header">
			<h1>Your Cart</h1>
			<div class="cart-actions">
				<a href="product.html">Continue Shopping</a>
				<button id="clear-cart">Clear Cart</button>
			</div>
		</div>

		<div id="cart-content"></div>
	</main>

	<script>
		// Simple cart utilities
		function loadCart(){ return JSON.parse(localStorage.getItem('cart') || '[]'); }
		function saveCart(cart){ localStorage.setItem('cart', JSON.stringify(cart)); }
		function formatPrice(n){ return '₹' + Number(n).toFixed(2); }

		function updateHeaderCount(){ const el = document.querySelector('.cart-count'); if(el) el.textContent = loadCart().length; }

		function showEmpty(container){ container.innerHTML = '<div class="cart-empty"><p>Your cart is empty.</p><p><a href="product.html">Add products</a> to see them here.</p></div>'; }

		function renderCart(){
			const cart = loadCart();
			const out = document.getElementById('cart-content');
			updateHeaderCount();

			if(cart.length === 0){ showEmpty(out); return; }

			let total = 0;
			let html = '<div class="cart-list">';
			for(let i=0;i<cart.length;i++){ const item = cart[i]; const price = parseFloat(item.price||0); total += price; const img = item.image||'https://via.placeholder.com/100'; const op = parseFloat(item.originalPrice||price); const disc = item.discount||0;
				html += '<div class="cart-item">'
					+ '<div class="cart-item-image"><img src="'+img+'" alt="'+(item.name||'')+'"></div>'
					+ '<div class="cart-item-details">'
						+ '<h3 class="cart-item-title">'+(item.name||'')+'</h3>'
						+ '<p class="cart-item-price">Price: '+formatPrice(price)+'</p>'
						+ '<div class="cart-item-meta"><span>Original: '+formatPrice(op)+'</span><span>Discount: '+disc+'%</span></div>'
					+ '</div>'
					+ '<div class="cart-item-price"><strong>'+formatPrice(price)+'</strong></div>'
					+ '<button class="cart-item-remove" data-index="'+i+'">Remove</button>'
				+ '</div>';
			}
			html += '</div>';
			html += '<div class="cart-total"><div><h2>Cart Total</h2><p>'+formatPrice(total)+'</p></div><a href="payment.html">Proceed to Checkout</a></div>';
			out.innerHTML = html;
			attachRemove();
			updateHeaderCount();
		}

		function attachRemove(){ const btns = document.querySelectorAll('.cart-item-remove'); for(let i=0;i<btns.length;i++){ btns[i].addEventListener('click', function(){ removeItem(Number(this.dataset.index)); }); } }

		function removeItem(idx){ const cart = loadCart(); cart.splice(idx,1); saveCart(cart); renderCart(); }

		function setupClear(){ const b = document.getElementById('clear-cart'); if(!b) return; b.addEventListener('click', function(){ saveCart([]); renderCart(); }); }

		document.addEventListener('DOMContentLoaded', function(){ renderCart(); setupClear(); });
	</script>
</body>
</html>
