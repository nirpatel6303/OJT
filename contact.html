<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zomato - Contact</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="main.css">
  <style>
    .page-content{padding:40px 30px; max-width:700px; margin:auto;}
    .page-title{font-size:38px; margin-bottom:20px; color:#333;}
    .contact-card{background:#fff9f2; padding:30px; border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,0.08);}
    .contact-card label{display:block; margin-top:18px; margin-bottom:8px; color:#333; font-weight:600;}
    .contact-card input,
    .contact-card textarea{width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;}
    .contact-card button{margin-top:18px; padding:12px 24px; border:none; background:#ff3939; color:white; border-radius:8px; cursor:pointer;}
    .contact-card button:hover{background:#d72e2e;}
  </style>
</head>
<body>
  <header>
    <img src="https://b.zmtcdn.com/web_assets/b40b97e677bc7b2ca77c58c61db266fe1603954218.png" height="30" alt="Zomato logo">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Order</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>
  <main class="page-content">
    <div class="contact-card">
      <h1 class="page-title">Contact Us</h1>
      <p>Have a question or need help with an order? Send us a message and we’ll get back to you soon.</p>
      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Tell us how we can help"></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Zomato. All rights reserved.</p>
  </footer>
</body>
</html>
